<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecopark – Nhà ở mặt đất</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav id="nav"></nav>
  <div class="page">
    <div style="background:linear-gradient(135deg,#2E7D32,#1B5E20);padding:3.5rem 0;color:#fff;text-align:center">
      <div class="container">
        <div class="section-tag" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" data-vi="Nhà ở mặt đất" data-en="Ground Houses">Nhà ở mặt đất</div>
        <h1 style="font-size:2rem;font-weight:800;margin:.75rem 0" data-vi="Biệt thự & Nhà phố Ecopark" data-en="Ecopark Villas & Townhouses">Biệt thự & Nhà phố Ecopark</h1>
        <p style="opacity:.85" data-vi="Sân vườn riêng, không gian rộng rãi, tiếp xúc thiên nhiên trực tiếp" data-en="Private garden, spacious living, direct contact with nature">Sân vườn riêng, không gian rộng rãi, tiếp xúc thiên nhiên trực tiếp</p>
      </div>
    </div>

    <div class="container section-sm">
      <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem;align-items:center">
        <select class="form-control" style="width:auto" id="filter-type">
          <option value="all" data-vi="Tất cả loại" data-en="All types">Tất cả loại</option>
          <option value="buy" data-vi="Mua" data-en="Buy">Mua</option>
          <option value="rent" data-vi="Thuê" data-en="Rent">Thuê</option>
        </select>
        <select class="form-control" style="width:auto" id="filter-zone">
          <option value="all" data-vi="Tất cả khu" data-en="All zones">Tất cả khu</option>
          <option value="bellavita">BellaVita</option>
          <option value="greennest">Green Nest</option>
        </select>
        <span id="result-count" class="text-muted text-sm"></span>
      </div>
      <div class="grid-4" id="houses-grid"></div>
    </div>

    <div style="background:var(--primary-pale);padding:3rem 0;text-align:center">
      <div class="container">
        <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:.75rem" data-vi="Muốn xem thực tế?" data-en="Want an In-Person Tour?">Muốn xem thực tế?</h2>
        <p class="text-muted mb-2" data-vi="Đặt lịch tham quan hoặc gửi yêu cầu tư vấn ngân sách." data-en="Schedule a visit or send your budget inquiry.">Đặt lịch tham quan hoặc gửi yêu cầu tư vấn ngân sách.</p>
        <a href="/request.html" class="btn-primary" data-vi="Gửi yêu cầu tư vấn" data-en="Send Inquiry">Gửi yêu cầu tư vấn</a>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-name" style="font-weight:700"></h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <img id="modal-img" class="modal-img" alt="" />
      <div class="modal-body">
        <div id="modal-body-content"></div>
        <a href="/request.html" class="btn-primary" style="width:100%;text-align:center;margin-top:1.25rem;display:block" data-vi="📋 Gửi yêu cầu đặt cọc" data-en="📋 Send Deposit Request">📋 Gửi yêu cầu đặt cọc</a>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>
  <script src="/js/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/page-nha-mat-dat.js"></script>
</body>
</html>
